<!-- @dsCard group="grader · 정적 핸드오프" viewport="1280x780" name="작업 기록 (정적)" subtitle="탭 필터 · 재다운로드 / 재생성 · 빈 상태" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STIZ grader · 작업 기록</title>
<link rel="icon" href="../assets/logos/stiz-favicon-32.png" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" />
<link rel="stylesheet" href="app.css" />
<style>
  /* ===== 계정 메뉴 + 비밀번호 변경 모달(4화면 공통 스타일) =====
     기존 디자인 변수(var(--*))만 사용 — 하드코딩 색 금지 규칙 준수. */
  .acct { position: relative; }
  .acct__btn { cursor: pointer; background: none; }
  .acct__btn .name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .acct__menu {
    position: absolute; top: calc(100% + 6px); right: 0; z-index: 80;
    min-width: 180px; padding: 6px;
    background: var(--surface-card); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }
  .acct__item {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 10px; border: none; background: none; cursor: pointer;
    font: var(--text-sm); color: var(--text-body); border-radius: var(--radius-sm); text-align: left;
  }
  .acct__item:hover { background: var(--surface-hover); }
  .acct__item .material-symbols-outlined { font-size: 18px; color: var(--text-subtle); }
  .pwmodal { position: fixed; inset: 0; z-index: 90;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    background: rgba(0,0,0,.45); }
  .pwmodal__panel { width: 100%; max-width: 380px; }
  .pwmodal__title { font: var(--text-lg-strong, 600 18px/1.4 sans-serif); color: var(--text-strong); margin-bottom: 6px; }
  .pwmodal__desc { font: var(--text-caption); color: var(--text-muted); margin-bottom: 16px; }
  .pwmodal__msg { min-height: 18px; margin: 4px 0 12px; font: var(--text-caption); color: var(--red-600, #d33); }
  .pwmodal__actions { display: flex; justify-content: flex-end; gap: 8px; }
  .login-field { margin-bottom: 12px; }
  .login-field label { display: block; font: var(--text-sm); color: var(--text-subtle); margin-bottom: 6px; }
  .login-field input { width: 100%; }
  /* .hidden 은 app.css 에 이미 정의됨 — 중복 선언하지 않는다. */
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar__brand">
      <img src="../assets/logos/stiz-logo-black.png" alt="STIZ" />
      <span class="tag">grader</span>
    </div>
    <nav class="nav">
      <a class="nav__item" href="work.html"><span class="material-symbols-outlined">add_box</span>작업</a>
      <a class="nav__item" href="patterns.html"><span class="material-symbols-outlined">dashboard_customize</span>패턴 관리</a>
      <a class="nav__item is-active" href="history.html"><span class="material-symbols-outlined">history</span>작업 기록</a>
      <a class="nav__item" href="settings.html"><span class="material-symbols-outlined">settings</span>설정</a>
    </nav>
    <div class="sidebar__foot">
      <div class="server-pill"><span class="dot"></span>서버 연결됨 · :8000</div>
      <div class="sidebar__note">스티즈 전사유니폼 출력 자동화</div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__left"><h1 class="page-title">작업 기록</h1></div>
      <div class="topbar__right">
        <button class="icon-btn" aria-label="도움말"><span class="material-symbols-outlined">help_outline</span></button>
        <!-- ===== 계정 메뉴(4화면 공통) ===== -->
        <div class="acct" id="acct">
          <button class="user-pill acct__btn" id="acctBtn" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="name" id="acctEmail">출력 1팀</span><span class="avatar" id="acctAvatar">S</span>
          </button>
          <div class="acct__menu hidden" id="acctMenu" role="menu">
            <button class="acct__item" id="acctPw" type="button" role="menuitem">
              <span class="material-symbols-outlined">key</span>비밀번호 변경
            </button>
            <button class="acct__item" id="acctLogout" type="button" role="menuitem">
              <span class="material-symbols-outlined">logout</span>로그아웃
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="content stack-5">
      <div class="tabs" id="tabs">
        <button class="tab is-active" data-tab="all">전체<span class="tab__count">5</span></button>
        <button class="tab" data-tab="done">완료<span class="tab__count">4</span></button>
        <button class="tab" data-tab="warn">확인 필요<span class="tab__count">1</span></button>
      </div>

      <div id="tableSlot"></div>
    </main>
  </div>
</div>

<!-- ===== 계정 공통 UI(4화면 동일): 비밀번호 변경 모달 ===== -->
<div class="pwmodal hidden" id="pwModal">
  <div class="pwmodal__panel card card--pad" role="dialog" aria-modal="true" aria-labelledby="pwTitle">
    <h2 class="pwmodal__title" id="pwTitle">비밀번호 변경</h2>
    <p class="pwmodal__desc">새 비밀번호를 입력하세요. (최소 6자)</p>
    <div class="login-field">
      <label for="pwNew">새 비밀번호</label>
      <input class="input" type="password" id="pwNew" autocomplete="new-password" placeholder="새 비밀번호" />
    </div>
    <div class="login-field">
      <label for="pwConfirm">새 비밀번호 확인</label>
      <input class="input" type="password" id="pwConfirm" autocomplete="new-password" placeholder="한 번 더 입력" />
    </div>
    <div class="pwmodal__msg" id="pwMsg"></div>
    <div class="pwmodal__actions">
      <button class="btn" type="button" id="pwCancel">취소</button>
      <button class="btn btn--primary" type="button" id="pwSubmit">변경</button>
    </div>
  </div>
</div>
<div class="toaster" id="toaster"></div>

<!-- 계정 기능(비번변경/로그아웃)에 필요한 Supabase JS SDK(CDN). 빌드 0 원칙. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====== 공통 인증 fetch 래퍼 (배포 게이트) ======
// 로그인 때 sessionStorage 에 저장한 토큰을 모든 /api 호출에 자동 부착한다.
//  · 로컬(무인증): 토큰 없으면 헤더 안 붙임 → 서버 그대로 통과(회귀 0).
//  · 401: 로그인 화면으로. · FormData: Content-Type 안 건드리고 headers 만 머지.
const TOKEN_KEY = "grader_access_token";
async function apiFetch(url, opts) {
  opts = opts || {};
  const headers = new Headers(opts.headers || {});
  const token = sessionStorage.getItem(TOKEN_KEY);
  if (token) headers.set("Authorization", "Bearer " + token);
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (res.status === 401) {
    // 만료된 토큰을 임시 보관함(sessionStorage)에서 먼저 비운다(의뢰서4: clear 후 리다이렉트).
    sessionStorage.removeItem(TOKEN_KEY);
    location.replace("/static/screens/login.html");
    throw new Error("로그인이 필요합니다.");
  }
  return res;
}

// 작업 기록은 서버 GET /api/jobs 로 채운다(빈 배열에서 시작 → fetch 후 갱신).
let JOBS = [];
const $ = (s) => document.querySelector(s);
let tab = "all";

// 날짜 표기를 화면 스타일(2026·06·20)로 다듬는다(서버는 "2026-06-20 14:03").
function fmtDate(raw) {
  if (!raw) return "";
  const datePart = String(raw).split(" ")[0];            // 시각 떼고 날짜만
  return datePart.replace(/-/g, "·");                    // YYYY-MM-DD → YYYY·MM·DD
}

// 탭 카운트(전체/완료/확인필요)를 실제 데이터로 갱신한다.
function updateTabCounts() {
  const all = JOBS.length;
  const done = JOBS.filter((j) => j.status === "done").length;
  const warn = JOBS.filter((j) => j.status === "warn").length;
  const tabs = $("#tabs").querySelectorAll(".tab__count");
  if (tabs[0]) tabs[0].textContent = all;
  if (tabs[1]) tabs[1].textContent = done;
  if (tabs[2]) tabs[2].textContent = warn;
}

// 서버에서 작업 기록을 받아 화면을 그린다.
function loadJobs() {
  apiFetch("/api/jobs")
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((list) => {
      // 서버 행을 화면이 쓰는 모양으로 정리(날짜 표기만 다듬음).
      JOBS = (Array.isArray(list) ? list : []).map((j) => ({
        id: j.id, date: fmtDate(j.date), name: j.name,
        pattern: j.pattern, count: j.count, status: j.status,
      }));
      updateTabCounts();
      render();
    })
    .catch(() => { JOBS = []; updateTabCounts(); render(); });
}

// 서버 헬스체크 → 사이드바 server-pill
(function refreshServerPill() {
  const pill = document.querySelector(".server-pill");
  if (!pill) return;
  apiFetch("/api/health")
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((d) => { pill.innerHTML = `<span class="dot"></span>서버 연결됨 · :${d.port}`; })
    .catch(() => { pill.innerHTML = `<span class="dot" style="background:var(--red-500,#e5484d);"></span>서버 연결 끊김`; });
})();

function render() {
  const rows = tab === "all" ? JOBS : JOBS.filter((j) => j.status === tab);
  const slot = $("#tableSlot");
  if (rows.length === 0) {
    slot.innerHTML = `
      <div class="card">
        <div class="empty">
          <div class="empty__icon"><span class="material-symbols-outlined">history</span></div>
          <div class="empty__title">작업 기록이 없습니다</div>
          <div class="empty__desc">주문을 생성하면 여기에 기록됩니다.</div>
        </div>
      </div>`;
    return;
  }
  slot.innerHTML = `
    <div class="tablewrap tablewrap--lg">
      <table class="dtable">
        <thead><tr>
          <th>날짜</th><th>주문명</th><th>패턴</th><th class="num">파일</th><th>상태</th><th class="num">작업</th>
        </tr></thead>
        <tbody>
          ${rows.map((j) => `
            <tr class="row-hover">
              <td class="muted mono">${j.date}</td>
              <td class="name-strong">${j.name}</td>
              <td>${j.pattern}</td>
              <td class="num">${j.count}</td>
              <td>${j.status === "done"
                ? '<span class="badge badge--pass badge--sm"><span class="material-symbols-outlined">check_circle</span>완료</span>'
                : '<span class="badge badge--warn badge--sm"><span class="material-symbols-outlined">warning</span>확인 필요</span>'}</td>
              <td class="num">
                <span class="row" style="display:inline-flex; gap:2px;">
                  <button class="icon-btn icon-btn--sm" data-act="download" data-name="${j.name}" aria-label="재다운로드"><span class="material-symbols-outlined">download</span></button>
                  <button class="icon-btn icon-btn--sm" data-act="regen" data-name="${j.name}" aria-label="같은 설정으로 재생성"><span class="material-symbols-outlined">refresh</span></button>
                  <button class="icon-btn icon-btn--sm" aria-label="더보기"><span class="material-symbols-outlined">more_vert</span></button>
                </span>
              </td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  slot.querySelectorAll("[data-act]").forEach((b) => b.addEventListener("click", () => {
    if (b.dataset.act === "download") toast("info", "download", "ZIP 다운로드 준비 중", `${b.dataset.name} · 잠시만 기다리세요`);
    else toast("info", "refresh", "같은 설정으로 재생성", `${b.dataset.name} · 작업 화면으로 이동합니다`);
  }));
}

$("#tabs").querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => {
  tab = t.dataset.tab;
  $("#tabs").querySelectorAll(".tab").forEach((x) => x.classList.toggle("is-active", x === t));
  render();
}));

function toast(tone, icon, title, body) {
  const el = document.createElement("div");
  el.className = "toast toast--" + tone;
  el.innerHTML = `<span class="material-symbols-outlined toast__icon">${icon}</span><div><div class="toast__title">${title}</div><div class="toast__body">${body}</div></div>`;
  $("#toaster").appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

render();      // 먼저 빈 표(도착 전)
loadJobs();    // 서버에서 실제 작업 기록을 받아 갱신

/* ====== 계정 메뉴 + 비밀번호 변경 + 로그아웃 (4화면 공통 블록) ======
   updateUser/signOut 은 Supabase 에 직접 말을 걸어야 하므로 login.html 처럼
   /api/public-config 로 URL·공개키만 받아 클라이언트를 만든다(비밀키 미노출). */
let acctSupa = null;
async function initAccount() {
  let cfg = {};
  try { cfg = await (await fetch("/api/public-config")).json(); } catch (e) { return; }
  if (!cfg.auth_required) {
    const acct = document.getElementById("acct");
    if (acct) acct.classList.add("hidden");   // 무인증(로컬)이면 계정 메뉴 숨김
    return;
  }
  if (!cfg.supabase_url || !cfg.supabase_publishable_key) return;
  acctSupa = window.supabase.createClient(cfg.supabase_url, cfg.supabase_publishable_key);
  try {
    let email = null;
    const u = await acctSupa.auth.getUser();
    email = u && u.data && u.data.user && u.data.user.email;
    if (!email) {
      const s = await acctSupa.auth.getSession();
      email = s && s.data && s.data.session && s.data.session.user && s.data.session.user.email;
    }
    if (email) {
      document.getElementById("acctEmail").textContent = email;
      document.getElementById("acctAvatar").textContent = email.charAt(0).toUpperCase();
    }
  } catch (e) {}
}

const acctBtn = document.getElementById("acctBtn");
const acctMenu = document.getElementById("acctMenu");
function closeAcctMenu() { acctMenu.classList.add("hidden"); acctBtn.setAttribute("aria-expanded", "false"); }
if (acctBtn) {
  acctBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = acctMenu.classList.toggle("hidden");
    acctBtn.setAttribute("aria-expanded", open ? "false" : "true");
  });
  document.addEventListener("click", (e) => { if (!e.target.closest("#acct")) closeAcctMenu(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeAcctMenu(); });
}

const pwModal = document.getElementById("pwModal");
const pwMsg = document.getElementById("pwMsg");
function openPwModal() {
  closeAcctMenu();
  document.getElementById("pwNew").value = "";
  document.getElementById("pwConfirm").value = "";
  pwMsg.textContent = "";
  pwModal.classList.remove("hidden");
  document.getElementById("pwNew").focus();
}
function closePwModal() { pwModal.classList.add("hidden"); }
document.getElementById("acctPw").addEventListener("click", openPwModal);
document.getElementById("pwCancel").addEventListener("click", closePwModal);
pwModal.addEventListener("click", (e) => { if (e.target === pwModal) closePwModal(); });
document.getElementById("pwSubmit").addEventListener("click", async () => {
  const np = document.getElementById("pwNew").value;
  const cf = document.getElementById("pwConfirm").value;
  if (np.length < 6) { pwMsg.textContent = "비밀번호는 최소 6자 이상이어야 합니다."; return; }
  if (np !== cf) { pwMsg.textContent = "두 비밀번호가 일치하지 않습니다."; return; }
  if (!acctSupa) { pwMsg.textContent = "인증 준비 중입니다. 잠시 후 다시 시도해 주세요."; return; }
  pwMsg.textContent = "변경 중…";
  try {
    const { error } = await acctSupa.auth.updateUser({ password: np });
    if (error) { pwMsg.textContent = "변경하지 못했습니다: " + (error.message || "알 수 없는 오류"); return; }
    closePwModal();
    toast("pass", "check_circle", "비밀번호가 변경되었습니다", "다음 로그인부터 새 비밀번호를 사용하세요.");
  } catch (err) { pwMsg.textContent = "변경 중 문제가 발생했습니다: " + err; }
});

document.getElementById("acctLogout").addEventListener("click", async () => {
  closeAcctMenu();
  try { if (acctSupa) await acctSupa.auth.signOut(); } catch (e) {}
  sessionStorage.removeItem(TOKEN_KEY);
  location.replace("/static/screens/login.html");
});

initAccount();
</script>
</body>
</html>
