<script>
// ====== 공통 인증 fetch 래퍼 (배포 게이트) ======
// 왜 필요한가(비유): 배포에서는 모든 /api 호출에 '출입증(토큰)' 을 붙여야 한다.
// 로그인 때 sessionStorage 에 저장한 토큰을 Authorization 헤더로 자동 부착한다.
//  · 로컬(무인증): 토큰이 없으면 헤더를 안 붙인다 → 서버가 그대로 통과(회귀 0).
//  · 401(미인증/만료): 로그인 화면으로 보낸다.
//  · FormData 업로드: Content-Type 을 절대 건드리지 않는다(브라우저 boundary 보존) — headers 만 머지.
const TOKEN_KEY = "grader_access_token";
async function apiFetch(url, opts) {
  opts = opts || {};
  const headers = new Headers(opts.headers || {});
  const token = sessionStorage.getItem(TOKEN_KEY);
  if (token) headers.set("Authorization", "Bearer " + token);
  const res = await fetch(url, Object.assign({}, opts, { headers }));
  if (res.status === 401) {
    // 출입증 없음/만료 → 로그인 화면으로(현재 작업은 버려진다).
    // 만료된 토큰을 임시 보관함(sessionStorage)에서 먼저 비운다(의뢰서4: clear 후 리다이렉트).
    sessionStorage.removeItem(TOKEN_KEY);
    location.replace("/static/screens/login.html");
    throw new Error("로그인이 필요합니다.");
  }
  return res;
}

// ====== 서버 데이터 (실 API 연결) ======
// 패턴 목록은 서버 GET /api/patterns 로 채운다. 처음엔 빈 배열로 두고,
// 화면 로드 직후 fetch 로 실제 등록 패턴(농구_V넥_양면 등)을 받아 렌더한다.
let PATTERNS = [];
const SIZE_ORDER = ["XS","S","M","L","XL","2XL","3XL","4XL","5XL"];
const sizeRank = (s) => { const i = SIZE_ORDER.indexOf(s); return i < 0 ? 99 : i; };

// --- generate a realistic large roster (대량 주문 시연용) ---
const FIRST = ["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권","황"];
const GIVEN = ["민준","서연","도윤","지우","하준","서준","지호","수아","예준","지유","주원","하은","건우","서아","현우","민서","우진","지민","선우","유나","도현","채원","시우","예린"];
const SZ = ["S","S","M","M","M","L","L","XL","XL","2XL"];
function buildRoster(n) {
  const rows = [];
  const failRows = new Set([5, 19, 33]); // 추출 실패(이름 누락) 시연
  for (let i = 0; i < n; i++) {
    const name = failRows.has(i) ? "" : FIRST[i % FIRST.length] + GIVEN[(i * 7) % GIVEN.length];
    rows.push({ size: SZ[i % SZ.length], qty: (i % 4) + 1, name, number: String((i * 3 + 7) % 99).padStart(2, "0") });
  }
  return rows;
}
let ORDER = buildRoster(48);

const CHECK_NAMES = ["무손실 보존", "단일 임베드", "CMYK 유지", "투명도", "재단선·너치 보존", "합성 정확"];
function buildChecks(transparencyFail) {
  return CHECK_NAMES.map((name) => {
    if (name === "투명도" && transparencyFail)
      return { name, ok: false, detail: "원본에 투명도가 남아 있어 출력 시 래스터화됩니다. 평탄화 후 재생성하세요." };
    const detail = {
      "무손실 보존": "원본 벡터 경로를 손실 없이 보존",
      "단일 임베드": "디자인을 1회만 임베드 (중복 없음)",
      "CMYK 유지": "색공간 CMYK 그대로 유지",
      "투명도": "투명도 없음 · 평탄 합성",
      "재단선·너치 보존": "조각 외곽 재단선 3 + 너치 6",
      "합성 정확": "조각·배번·이름 위치 정확",
    }[name];
    return { name, ok: true, detail };
  });
}
// RESULTS: 48 결과, 일부 투명도 FAIL
const FAIL_RESULT = new Set([7, 22, 40]);
let RESULTS = ORDER.map((r, i) => {
  const warn = FAIL_RESULT.has(i);
  return {
    size: r.size,
    name: r.name || ("선수 " + (i + 1)),
    number: r.number,
    url: null,                       // 서버 제공 PNG 경로 자리
    status: warn ? "warn" : "pass",
    checks: buildChecks(warn),
  };
});

// 패턴 결함·사이즈 누락으로 생성에서 제외된 주문 (의뢰 3)
const SKIPPED = [
  { size:"3XL", count:5, reason:"패턴 파일 결함으로 제외" },
  { size:"XS",  count:2, reason:"사이즈 누락 — 주문서에 없음" },
];
// 출력 형식 — 설정 + 작업 흐름에서 선택(localStorage). PDF·EPS·둘 다 지원 (의뢰 6)
const OUT_FMT_MAP = { vector:"벡터 CMYK 출력", pdf:"PDF", eps:"EPS", both:"PDF+EPS" };
function outFmtKey() { return localStorage.getItem("stiz-grader-output-format") || "vector"; }
function outFmt() { return OUT_FMT_MAP[outFmtKey()] || OUT_FMT_MAP.vector; }
function setOutFmt(k) { localStorage.setItem("stiz-grader-output-format", k); }

const STEPS = ["패턴 선택","디자인","주문서","생성","검수"];
const TITLES = ["패턴을 선택하세요","기준 디자인 업로드","주문서 확인 · 수정","출력 파일 생성","미리보기 검수"];
const SUBS = [
  "등록된 패턴 프리셋 중 하나를 고릅니다.",
  "기준 사이즈 디자인 1개를 올리면 전 사이즈로 자동 확장됩니다.",
  "엑셀에서 추출된 행을 확인하고 필요하면 수정하세요. 검색·필터·정렬로 빠르게 좁힙니다.",
  "사이즈 × 선수별 {fmt}를 생성합니다.",
  "각 결과를 클릭해 배번·이름을 확대 검수하고 ZIP으로 내려받으세요.",
];

// ====== State ======
let step = 0;
let patternId = null;   // 서버에서 패턴을 받은 뒤 첫 패턴으로 설정된다.
let design = "idle";      // idle | warn | pass | (데모 케이스 키)
// 서버 디자인 점검 결과(실 업로드). { status, checks[], message, flattened, file }
// 이 값이 있으면 renderDesign 이 데모(DESIGN_CASES) 대신 이걸 우선 표시한다.
let designServer = null;
let designLoading = false;   // 업로드/점검 진행 중 표시용
// 서버 주문서 파싱 결과 보관(경고 표시용).
let orderServer = null;
let orderLoading = false;
let orderUploaded = false;
let genDone = 0;
let genTimer = null;
// bulk-order controls
let oQuery = "", oFailOnly = false, oSort = "default", oPage = 1;
const O_PAGE = 12;
// bulk-review controls
let rTab = "all", rQuery = "", rPage = 1;
const R_PAGE = 12;
// modal
let modalList = [], modalPos = -1;
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

// ====== 파일 업로드 헬퍼 (실 input + fetch) ======
// 숨은 <input type=file> 을 즉석에서 만들어 클릭 → 파일 선택 → 콜백.
// (마크업을 건드리지 않으려고 DOM 에 남기지 않고 1회용으로 쓴다.)
function pickFile(accept, onPick) {
  const inp = document.createElement("input");
  inp.type = "file";
  if (accept) inp.accept = accept;
  inp.style.display = "none";
  inp.addEventListener("change", () => {
    const f = inp.files && inp.files[0];
    if (f) onPick(f);
  });
  document.body.appendChild(inp);
  inp.click();
  // 선택 후 정리(선택 취소해도 다음 GC 까지만 남음).
  setTimeout(() => inp.remove(), 0);
}

// 드래그앤드롭 배선 — 실제 OS 파일 드롭이 확실히 동작하게 만든다.
//   왜(근본 원인): 예전엔 드롭존 <button> 요소에만 dragover/drop 을 달았다.
//     그런데 실제 마우스 드롭은 드롭존 '안의 글씨(span)·여백·패딩' 같이
//     핸들러가 정확히 안 걸린 자리에 떨어지기 쉽다. 그러면 그 이벤트는
//     문서(document)로 흘러가는데, 문서엔 차단이 없어 '브라우저 기본동작'
//     (= 파일을 새 탭에서 열기)으로 빠져 첨부가 안 됐다.
//     (playwright 의 합성 drop 은 핸들러가 달린 요소에 '직접' 쏴서 이 함정을
//      못 잡았다 — 그래서 합성 PASS 만으로는 안심하면 안 된다.)
//   해결(비유): 우편물 분류실 전체(document)에 "바닥에 떨어진 파일을 함부로
//     열지 마"라는 규칙을 깔고, 떨어진 '위치'를 보고 디자인/주문 우편함 중
//     가까운 쪽으로 넣어 준다. 드롭존 글씨 위든 여백이든 박스 안이면 첨부된다.
//
// 현재 화면에 떠 있는 드롭존들을 등록해 두는 표(렌더마다 새로 그려지므로
// id 기준으로 최신 onFile 콜백을 보관한다).
const DROPZONES = {};   // { designDrop: fn, orderDrop: fn }
function wireDropzone(el, onFile) {
  if (!el || !el.id) return;
  // 이 드롭존의 '업로드 경로'를 등록(가장 최근 렌더의 콜백으로 갱신).
  DROPZONES[el.id] = onFile;
}
// 좌표(x,y)가 어느 드롭존 박스 안인지 찾아 { el, onFile } 반환(없으면 null).
function dropzoneAt(x, y) {
  for (const id in DROPZONES) {
    const el = document.getElementById(id);
    if (!el) continue;
    const r = el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
      return { el, onFile: DROPZONES[id] };
    }
  }
  return null;
}
// 모든 드롭존 하이라이트 해제.
function clearDropHighlight() {
  for (const id in DROPZONES) {
    const el = document.getElementById(id);
    if (el) el.classList.remove("is-drag");
  }
}
// ── document 레벨 안전 가드(페이지 어디에 드롭해도 새 탭 열기 차단) ──
//   dragover 에서 preventDefault 를 해야 'drop' 이벤트가 발생한다(브라우저 규칙).
document.addEventListener("dragover", (e) => {
  // 파일을 끄는 중일 때만 개입(텍스트 드래그 등은 건드리지 않음).
  e.preventDefault();
  e.dataTransfer.dropEffect = "copy";
  const hit = dropzoneAt(e.clientX, e.clientY);
  clearDropHighlight();
  if (hit) hit.el.classList.add("is-drag");   // 박스 안이면 하이라이트
});
document.addEventListener("dragleave", (e) => {
  // 창 밖으로 완전히 나갔을 때만 하이라이트 정리.
  if (e.clientX === 0 && e.clientY === 0) clearDropHighlight();
});
document.addEventListener("drop", (e) => {
  e.preventDefault();   // 어디에 떨어뜨려도 새 탭 열기 차단
  clearDropHighlight();
  const hit = dropzoneAt(e.clientX, e.clientY);
  if (!hit) return;     // 드롭존 밖이면 조용히 무시(파일 안 열림)
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f && hit.onFile) hit.onFile(f);   // 클릭 업로드와 '똑같은' 경로로 처리
});

// 디자인 파일을 서버에 보내 5케이스 점검 결과를 받는다.
async function uploadDesign(file) {
  designLoading = true; renderDesign();
  try {
    const fd = new FormData();
    fd.append("file", file);
    const res = await apiFetch("/api/design/check", { method: "POST", body: fd });
    const data = await res.json();
    // 서버 응답에 원본 파일명을 얹어 화면에서 보여준다.
    designServer = Object.assign({ file: file.name, size: file.size }, data);
    // status(pass|warn|fail) 를 기존 design 상태에도 반영(스테퍼 진행조건 재사용).
    design = data.status || "fail";
  } catch (e) {
    designServer = { status: "fail", checks: [], flattened: false,
      message: "서버에 연결하지 못했습니다. 서버가 켜져 있는지 확인하세요. (" + e + ")",
      file: file.name };
    design = "fail";
  } finally {
    designLoading = false;
    renderDesign(); update();
  }
}

// 주문서(xlsx)를 서버에 보내 행 데이터를 받아 표를 채운다.
async function uploadOrder(file) {
  orderLoading = true; orderUploaded = true; oPage = 1; renderOrder();
  try {
    const fd = new FormData();
    fd.append("file", file);
    const res = await apiFetch("/api/order/parse", { method: "POST", body: fd });
    const data = await res.json();
    // 서버 행 [{name,number,size,qty}] 을 표 모델(ORDER) 로 옮긴다(수량은 숫자로).
    ORDER = (data.rows || []).map((r) => ({
      size: r.size || "", qty: Number(r.qty) || 1,
      name: r.name || "", number: r.number || "",
    }));
    orderServer = Object.assign({ fileName: file.name }, data);
  } catch (e) {
    orderServer = { rows: [], warnings: ["서버에 연결하지 못했습니다: " + e], total: 0, empty_size: 0 };
    ORDER = [];
  } finally {
    orderLoading = false;
    renderOrder(); update();
  }
}

// ====== Stepper ======
function renderStepper() {
  let h = "";
  STEPS.forEach((s, i) => {
    const cls = i < step ? "is-done" : i === step ? "is-active" : "";
    const inner = i < step ? '<span class="material-symbols-outlined">check</span>' : (i + 1);
    h += `<div class="step ${cls}"><span class="step__dot">${inner}</span><span class="step__label">${s}</span></div>`;
    if (i < STEPS.length - 1) h += '<span class="step__line"></span>';
  });
  $("#stepper").innerHTML = h;
}

// ====== shared pager ======
function renderPager(container, total, page, pageSize, onGo) {
  if (!container) return;
  const pages = Math.max(1, Math.ceil(total / pageSize));
  if (pages <= 1) { container.innerHTML = ""; return; }
  const from = total ? (page - 1) * pageSize + 1 : 0;
  const to = Math.min(total, page * pageSize);
  // build compact page buttons
  const btns = [];
  const add = (p) => btns.push(`<button class="pager__btn ${p === page ? "is-active" : ""}" data-go="${p}">${p}</button>`);
  const dots = () => btns.push('<span class="pager__dots">…</span>');
  let pset = new Set([1, pages, page, page - 1, page + 1]);
  let prev = 0;
  [...pset].filter((p) => p >= 1 && p <= pages).sort((a, b) => a - b).forEach((p) => {
    if (p - prev > 1) dots();
    add(p); prev = p;
  });
  container.innerHTML = `
    <div class="pager">
      <span class="pager__info">${from}–${to} / ${total}</span>
      <div class="pager__ctrl">
        <button class="pager__btn" data-go="${page - 1}" ${page === 1 ? "disabled" : ""} aria-label="이전"><span class="material-symbols-outlined">chevron_left</span></button>
        ${btns.join("")}
        <button class="pager__btn" data-go="${page + 1}" ${page === pages ? "disabled" : ""} aria-label="다음"><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
    </div>`;
  container.querySelectorAll("[data-go]").forEach((b) => b.addEventListener("click", () => {
    const p = +b.dataset.go; if (p >= 1 && p <= pages) onGo(p);
  }));
}

// ====== Panel 3 · generate ======
function renderFmtSeg() {
  // 실제로 서버에 보낼 형식(apiFmt: vector 면 서버 기본값)을 활성칩으로 표시한다.
  //   예전엔 localStorage 키(vector 일 수 있음)로만 칠해, 미선택 시 아무 칩도
  //   활성이 안 돼 직원이 무엇이 적용될지 몰랐다. 이제 vector 면 서버 기본값
  //   세그먼트를 '기본' 표식과 함께 활성화해 보여 준다.
  const eff = apiFmt();              // pdf | eps | both (vector → serverFmtDefault)
  const isDefault = outFmtKey() === "vector";  // 직원이 아직 직접 안 고른 상태
  $("#fmtSeg").querySelectorAll("button").forEach((b) => {
    const on = b.dataset.fmt === eff;
    b.classList.toggle("is-active", on);
    // 미선택(서버 기본값 적용) 칩엔 '기본' 보조표식을 살짝 달아 둔다.
    b.classList.toggle("is-default", on && isDefault);
    b.title = on && isDefault ? "설정의 기본 출력 형식입니다. 다른 형식을 누르면 바꿀 수 있어요." : "";
  });
}
$("#fmtSeg").querySelectorAll("button").forEach((b) => b.addEventListener("click", () => {
  setOutFmt(b.dataset.fmt);
  renderFmtSeg();
  // 형식을 바꾸면(아직 생성 전이면) 시작 버튼/라벨을 갱신. 이미 생성된 결과가
  // 있으면 검수 화면(ZIP 형식 안내)도 다시 그려 준다.
  if (!jobResult) { $("#genLabel").textContent = outFmt() + " 생성 중…"; update(); }
  else if (step === 4) renderReview();
}));
// ── 출력 형식 → API 값(pdf|eps|both) ──
// 세그먼트 기본값(localStorage)은 'vector' 일 수 있다. API 는 pdf|eps|both 만
// 받으므로, vector(미선택)이면 서버 설정 기본값(serverFmtDefault)으로 보낸다.
let serverFmtDefault = "pdf";   // GET /api/settings 로 채운다(없으면 pdf).
function apiFmt() {
  const k = outFmtKey();
  return (k === "pdf" || k === "eps" || k === "both") ? k : serverFmtDefault;
}

// 서버 작업 상태(비동기 생성).
let jobId = null;        // POST /api/jobs 로 받은 작업 id
let jobTotal = 0;        // 진행바 분모(주문 행 수)
let jobResult = null;    // GET /api/jobs/{id} 결과(검수 그리드 원천)
let jobError = null;     // 생성 실패 사유(한국어)

// 생성 단계 진입 시 초기화: 형식만 고르도록 진행바·칩을 숨기고 대기 상태로 둔다.
//   (자동 생성을 없앤 대신, 이 함수가 '아직 시작 전' 화면을 준비한다.)
let genStarted = false;   // '생성 시작'을 눌렀는지 — 하단 버튼 라벨 분기에 쓴다.
function prepGenerate() {
  clearInterval(genTimer);
  genStarted = false;
  jobId = null; jobResult = null; jobError = null; genDone = 0;
  renderFmtSeg();                              // 형식 세그먼트(기본값 활성표시)
  $("#genProgress").classList.add("hidden");   // 시작 전엔 진행바를 숨긴다
  $("#genProgress").classList.remove("progress--pass", "progress--fail");
  $("#genFill").style.width = "0%";
  $("#genPills").innerHTML = "";
  $("#genCancel").classList.add("hidden");     // 시작 전엔 '생성 취소'도 숨김
}

// "생성 시작": 화면 표(ORDER)+패턴+디자인 토큰을 서버로 보내 비동기 작업을 띄운다.
async function startGenerate() {
  genStarted = true;
  $("#genProgress").classList.remove("hidden");  // 시작하면 진행바 노출
  $("#genCancel").classList.remove("hidden");
  clearInterval(genTimer);
  jobId = null; jobResult = null; jobError = null; genDone = 0;
  renderFmtSeg();
  $("#genProgress").classList.remove("progress--pass");
  $("#genFill").style.width = "0%";
  $("#genLabel").textContent = "생성 준비 중…";
  $("#genTotal").textContent = ORDER.length;
  $("#genDone").textContent = 0;
  renderGenPillsLive();
  try {
    const body = {
      patternId: patternId,
      // 디자인 점검 때 받은 영수증(토큰). 없으면 서버가 명시 경로/기본을 쓴다.
      design_token: (designServer && designServer.design_token) || null,
      rows: ORDER.map((r) => ({ name: r.name, number: r.number, size: r.size, qty: r.qty })),
      out_format: apiFmt(),
    };
    const res = await apiFetch("/api/jobs", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
    jobId = data.job_id;
    jobTotal = data.total || ORDER.length;
    $("#genLabel").textContent = OUT_FMT_MAP[apiFmt()] + " 생성 중…";
    // 진행상태를 주기적으로 물어본다(폴링).
    genTimer = setInterval(pollProgress, 600);
    pollProgress();
  } catch (e) {
    jobError = "생성을 시작하지 못했습니다: " + (e.message || e);
    $("#genLabel").textContent = "생성 실패";
    $("#genProgress").classList.add("progress--fail");
    update();
  }
}

// 진행상태 폴링: 완료/전체로 진행바를 채우고, done 이면 결과를 받아 검수로 넘긴다.
async function pollProgress() {
  if (!jobId) return;
  try {
    const res = await apiFetch("/api/jobs/" + jobId + "/progress");
    const p = await res.json();
    if (!res.ok) throw new Error(p.error || ("HTTP " + res.status));
    genDone = p.done || 0;
    const total = p.total || jobTotal || 1;
    $("#genDone").textContent = genDone;
    $("#genTotal").textContent = total;
    $("#genFill").style.width = (genDone / total * 100) + "%";
    renderGenPillsLive();
    if (p.status === "done") {
      clearInterval(genTimer);
      $("#genLabel").textContent = "생성 완료";
      $("#genProgress").classList.add("progress--pass");
      $("#genCancel").classList.add("hidden");
      await loadJobResult();   // 결과(job.json) 로드 → RESULTS 채움
      update();
    } else if (p.status === "error") {
      clearInterval(genTimer);
      jobError = p.error || "생성 중 오류가 발생했습니다.";
      $("#genLabel").textContent = "생성 실패";
      $("#genProgress").classList.add("progress--fail");
      $("#genCancel").classList.add("hidden");
      update();
    }
  } catch (e) {
    // 일시적 네트워크 흔들림은 다음 폴링에서 회복되므로 라벨만 살짝 알린다.
    $("#genLabel").textContent = "진행 확인 중…";
  }
}

// 완료된 작업 결과를 받아 검수 그리드 원천(RESULTS·SKIPPED) 으로 변환한다.
async function loadJobResult() {
  const res = await apiFetch("/api/jobs/" + jobId);
  const data = await res.json();
  if (!res.ok) { jobError = data.error || "결과를 불러오지 못했습니다."; return; }
  jobResult = data;
  // outputs → RESULTS(검수 타일). preview 는 /api/jobs/{id}/preview/{file} 로 부른다.
  RESULTS = (data.outputs || []).map((o) => ({
    size: o.size, name: o.name || "(이름없음)", number: o.number || "",
    // preview 는 <img>/background-image 로 그려지는데 그건 브라우저 직접 요청이라
    // Authorization 헤더가 안 붙는다(배포 인증 모드에서 401). 그래서 아래에서
    // apiFetch 로 PNG 를 받아 blob URL 로 바꿔 채운다(우선 preview 파일명만 보관).
    url: null,
    _previewFile: o.preview || null,
    status: o.status || (o.verify_pass ? "pass" : "warn"),
    checks: (o.checks || []).map((c) => ({ name: c.name, ok: !!c.ok, detail: c.detail || "" })),
    checksEps: o.checks_eps || null,
    pdf: o.pdf, eps: o.eps,
  }));
  // preview PNG 를 토큰 붙은 apiFetch 로 받아 blob URL 로 채운다(로컬은 토큰 없이 그대로).
  await Promise.all(RESULTS.map(async (r) => {
    if (!r._previewFile) return;
    try {
      const pres = await apiFetch("/api/jobs/" + jobId + "/preview/" + encodeURIComponent(r._previewFile));
      if (pres.ok) r.url = URL.createObjectURL(await pres.blob());
    } catch (e) { /* 미리보기 실패는 치명 아님 — 기본 아이콘으로 표시 */ }
  }));
  // 건너뜀: 행 단위 skip(사유) + 비활성 사이즈(결함)를 사이즈별로 묶어 배너로.
  const skipMap = {};
  (data.skip || []).forEach((s) => {
    const sz = s.size || "?"; const reason = s.reason || "생성 제외";
    const key = sz + "||" + reason;
    skipMap[key] = (skipMap[key] || 0) + 1;
  });
  // SKIPPED 는 원본에서 const 로 선언돼 재할당이 안 된다. 그래서 '내용만' 비우고
  // 새 항목을 push 해 채운다(배열 자체는 그대로, const 제약 위반 없음).
  SKIPPED.length = 0;
  Object.keys(skipMap).forEach((k) => {
    const [size, reason] = k.split("||");
    SKIPPED.push({ size, count: skipMap[k], reason });
  });
}

// 선택 형식으로 ZIP 을 받아 브라우저 다운로드를 띄운다(둘 다면 pdf/·eps/ 하위).
// apiFetch 로 blob 을 받아 다운로드한다 — <a href> 직접 요청은 토큰이 안 붙어
// 배포 인증 모드에서 401 이 나므로(로컬은 토큰 없이 그대로 동작 = 회귀 0).
async function downloadZip(fmt) {
  if (!jobId) return;
  const url = "/api/jobs/" + jobId + "/zip?format=" + encodeURIComponent(fmt);
  try {
    const res = await apiFetch(url);
    if (!res.ok) { alert("다운로드에 실패했습니다. 잠시 후 다시 시도해 주세요."); return; }
    const blob = await res.blob();
    // 서버가 준 파일명(Content-Disposition)을 그대로 살리기 어려우니 보기 좋은 이름을 만든다.
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = objUrl;
    a.download = "grader_" + (jobId || "output") + "_" + fmt + ".zip";
    document.body.appendChild(a); a.click(); a.remove();
    // 메모리 누수 방지: 다운로드 트리거 후 objectURL 해제.
    setTimeout(() => URL.revokeObjectURL(objUrl), 4000);
  } catch (e) {
    // apiFetch 가 401 에서 로그인으로 리다이렉트하면 여기로 안 온다(throw 됨).
  }
}

// 단일 파일 다운로드(모달의 '이 파일 다운로드'): 형식에 맞는 출력 1개를 연다.
function downloadOne(result, fmt) {
  const rel = fmt === "eps" ? result.eps : result.pdf;
  if (!rel || !jobResult) { downloadZip(apiFmt()); return; }  // 단건 경로 없으면 ZIP 폴백
  // job.json 의 상대경로는 정적 서빙 대상이 아니므로(보안), 단건도 ZIP 으로 받게 한다.
  downloadZip(fmt === "eps" ? "eps" : "pdf");
}

// 생성 진행 중 실제 출력 칩(완료/대기) — 주문 행 기준으로 그린다.
function renderGenPillsLive() {
  const total = jobTotal || ORDER.length;
  const shown = ORDER.slice(0, 16);
  $("#genPills").innerHTML = shown.map((r, i) => {
    const done = i < genDone;
    return `<span class="pill ${done ? "is-done" : ""}"><span class="material-symbols-outlined">${done ? "check_circle" : "schedule"}</span>${esc(r.size)} · ${esc(r.number)}</span>`;
  }).join("") + (total > 16 ? `<span class="pill">+${total - 16}</span>` : "");
}
// ====== Panel 4 · review (대량 대응 + 상세 모달) ======
function reviewView() {
  let list = RESULTS.map((r, i) => ({ ...r, _i: i }));
  if (rTab === "pass") list = list.filter((r) => r.status === "pass");
  else if (rTab === "warn") list = list.filter((r) => r.status === "warn");
  if (rQuery.trim()) {
    const q = rQuery.trim().toLowerCase();
    list = list.filter((r) => r.name.toLowerCase().includes(q) || String(r.number).includes(q));
  }
  return list;
}
function renderReview() {
  const passCount = RESULTS.filter((r) => r.status === "pass").length;
  const warnCount = RESULTS.length - passCount;
  const allPass = warnCount === 0;
  $("#verdict").className = "verdict " + (allPass ? "verdict--pass" : "verdict--warn");
  $("#verdict").innerHTML = `
    <div class="verdict__left">
      <span class="material-symbols-outlined verdict__icon">${allPass ? "verified" : "warning"}</span>
      <div>
        <div class="verdict__title tnum">${passCount} / ${RESULTS.length} 공장 전달 가능</div>
        <div class="verdict__sub">${allPass ? "색은 참고용이며 실제 출력색은 공장 기준입니다." : `${warnCount}건 확인 필요 — 결과를 클릭해 상세를 검수하세요.`}</div>
      </div>
    </div>
    <button class="btn btn--primary" id="zipBtn"><span class="material-symbols-outlined">download</span>ZIP 다운로드(${outFmt()})</button>`;

  // 둘 다(both)일 때 ZIP 하위폴더 안내 (의뢰 6)
  $("#fmtNote").innerHTML = outFmtKey() === "both" ? `
    <div class="note" style="padding:0;"><span class="material-symbols-outlined">folder_zip</span>두 형식을 함께 출력합니다. ZIP 안에서 <span class="mono">pdf/</span> · <span class="mono">eps/</span> 하위폴더로 분리됩니다.</div>` : "";

  // 건너뜀 N건 배너 (의뢰 3)
  const skipTotal = SKIPPED.reduce((a, s) => a + s.count, 0);
  $("#skipBanner").innerHTML = skipTotal ? `
    <div class="alert alert--warn">
      <span class="material-symbols-outlined alert__icon">block</span>
      <div style="flex:1;">
        <div class="alert__title">건너뜀 ${skipTotal}건 — 생성에서 제외됨</div>
        <div class="alert__body" style="margin-top:6px;">
          ${SKIPPED.map((s) => `<div class="row" style="gap:7px; margin-top:3px;"><span class="badge badge--warn badge--sm tnum">${s.size} ${s.count}건</span><span class="muted">${s.reason}</span></div>`).join("")}
        </div>
      </div>
    </div>` : "";

  // controls: tabs + search
  $("#reviewControls").innerHTML = `
    <div class="stack-4">
      <div class="tabs">
        <button class="tab ${rTab==="all"?"is-active":""}" data-tab="all">전체<span class="tab__count">${RESULTS.length}</span></button>
        <button class="tab ${rTab==="pass"?"is-active":""}" data-tab="pass">전달 가능<span class="tab__count">${passCount}</span></button>
        <button class="tab ${rTab==="warn"?"is-active":""}" data-tab="warn">확인 필요<span class="tab__count">${warnCount}</span></button>
      </div>
      <div class="toolbar">
        <div class="search">
          <span class="material-symbols-outlined">search</span>
          <input id="rSearch" type="text" placeholder="이름 · 배번 검색" value="${esc(rQuery)}" />
        </div>
        <div class="toolbar__spacer"></div>
        <span class="pager__info" id="rCount"></span>
      </div>
    </div>`;

  const view = reviewView();
  const totalPages = Math.max(1, Math.ceil(view.length / R_PAGE));
  if (rPage > totalPages) rPage = totalPages;
  const pageItems = view.slice((rPage - 1) * R_PAGE, rPage * R_PAGE);
  $("#rCount").textContent = `${view.length}건 표시`;

  if (!pageItems.length) {
    $("#reviewGrid").className = "";
    $("#reviewGrid").innerHTML = `<div class="card"><div class="empty"><div class="empty__icon"><span class="material-symbols-outlined">filter_alt_off</span></div><div class="empty__title">조건에 맞는 결과가 없습니다</div><div class="empty__desc">다른 탭을 고르거나 검색어를 바꿔보세요.</div></div></div>`;
  } else {
    $("#reviewGrid").className = "grid-4";
    $("#reviewGrid").innerHTML = pageItems.map((r) => {
      const pass = r.status === "pass";
      // 실 미리보기 PNG 가 있으면 배경으로 깔고, 없으면 기존 아이콘 placeholder.
      const imgBg = r.url
        ? `background-image:url('${r.url}'); background-size:contain; background-repeat:no-repeat; background-position:center; background-color:var(--surface-sunken);`
        : "";
      return `
        <div class="tile card--interactive" data-open="${r._i}" style="cursor:pointer;">
          <div class="tile__img" style="${imgBg}">
            ${r.url ? "" : '<span class="material-symbols-outlined">checkroom</span>'}
            <span class="tile__num">${esc(r.number)}</span>
            <span class="tile__badge"><span class="badge ${pass ? "badge--pass" : "badge--warn"} badge--sm"><span class="material-symbols-outlined">${pass ? "check" : "warning"}</span>${pass ? "PASS" : "확인"}</span></span>
          </div>
          <div class="tile__foot">
            <div class="tile__name">${esc(r.name)}</div>
            <div class="tile__size">${esc(r.size)}</div>
          </div>
        </div>`;
    }).join("");
  }

  renderPager($("#reviewPager"), view.length, rPage, R_PAGE, (p) => { rPage = p; renderReview(); });

  // ZIP 다운로드: 선택 형식으로 /api/jobs/{id}/zip?format= 을 받아 저장한다.
  const zb = $("#zipBtn");
  if (zb) zb.addEventListener("click", () => downloadZip(apiFmt()));

  // wire
  $("#reviewControls").querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => { rTab = t.dataset.tab; rPage = 1; renderReview(); }));
  const rs = $("#rSearch");
  rs.addEventListener("input", (e) => { rQuery = e.target.value; rPage = 1; renderReview(); const x=$("#rSearch"); x.focus(); x.setSelectionRange(x.value.length,x.value.length); });
  $("#reviewGrid").querySelectorAll("[data-open]").forEach((el) => el.addEventListener("click", () => openModal(+el.dataset.open)));
}

// ====== 검수 상세(줌) 모달 ======
function openModal(resultIndex) {
  modalList = reviewView().map((r) => r._i);     // navigate within current filter
  modalPos = modalList.indexOf(resultIndex);
  if (modalPos < 0) { modalList = RESULTS.map((_, i) => i); modalPos = resultIndex; }
  renderModal();
  $("#lightbox").classList.remove("hidden");
}
function closeModal() { $("#lightbox").classList.add("hidden"); modalPos = -1; }
function modalStep(d) {
  if (modalPos < 0) return;
  modalPos = (modalPos + d + modalList.length) % modalList.length;
  renderModal();
}
function renderModal() {
  const r = RESULTS[modalList[modalPos]];
  const pass = r.status === "pass";
  const checksHtml = r.checks.map((c) => `
    <div class="check">
      <span class="material-symbols-outlined check__ic ${c.ok ? "ok" : "no"}">${c.ok ? "check_circle" : "cancel"}</span>
      <div>
        <div class="check__name">${esc(c.name)}</div>
        <div class="check__detail ${c.ok ? "" : "no"}">${esc(c.detail)}</div>
      </div>
    </div>`).join("");
  $("#lightbox").innerHTML = `
    <div class="lb" role="dialog" aria-modal="true">
      <div class="lb__head">
        <div class="lb__title">
          <span class="num">${esc(r.number)}</span>
          <div>
            <div class="meta">${esc(r.name)} · ${esc(r.size)}</div>
            <div class="sub">${modalPos + 1} / ${modalList.length} · ${pass ? "전달 가능" : "확인 필요"}</div>
          </div>
          <span class="badge ${pass ? "badge--pass" : "badge--warn"} badge--sm" style="margin-left:4px;"><span class="material-symbols-outlined">${pass ? "verified" : "warning"}</span>${pass ? "전달 가능" : "확인 필요"}</span>
        </div>
        <div class="lb__nav">
          <button class="icon-btn" id="mPrev" aria-label="이전 결과 (←)"><span class="material-symbols-outlined">chevron_left</span></button>
          <button class="icon-btn" id="mNext" aria-label="다음 결과 (→)"><span class="material-symbols-outlined">chevron_right</span></button>
          <button class="icon-btn" id="mClose" aria-label="닫기"><span class="material-symbols-outlined">close</span></button>
        </div>
      </div>
      <div class="lb__body">
        <div class="lb__preview">
          <div class="lb__jersey" style="${r.url ? `background-image:url('${r.url}'); background-size:contain; background-repeat:no-repeat; background-position:center;` : ""}">
            ${r.url ? "" : `
            <div class="lb__overlay lb__overlay--number" style="left:34%; top:20%; width:32%; height:18%;"><span class="tag">배번</span>${esc(r.number)}</div>
            <div class="lb__overlay lb__overlay--name" style="left:28%; top:48%; width:44%; height:11%; font-size:13px;"><span class="tag">이름</span>${esc(r.name)}</div>`}
          </div>
          <div class="lb__zoomtag"><span class="material-symbols-outlined">center_focus_strong</span>${r.url ? "실제 합성 미리보기" : "배번·이름 영역 오버레이 (preset 좌표)"}</div>
        </div>
        <div class="lb__side">
          <div>
            <div class="eyebrow" style="margin-bottom:8px;">검증 항목</div>
            <div class="lb__checks">${checksHtml}</div>
          </div>
        </div>
      </div>
      <div class="lb__foot">
        <span class="muted" style="font:var(--text-caption);">←/→ 이동 · Esc 닫기</span>
        <div class="row" style="gap:8px;">
          <button class="btn btn--secondary btn--sm" id="mNext2">다음<span class="material-symbols-outlined">arrow_forward</span></button>
          <button class="btn btn--primary btn--sm" id="mDownload"><span class="material-symbols-outlined">download</span>이 파일 다운로드</button>
        </div>
      </div>
    </div>`;
  $("#mPrev").addEventListener("click", () => modalStep(-1));
  $("#mNext").addEventListener("click", () => modalStep(1));
  $("#mNext2").addEventListener("click", () => modalStep(1));
  $("#mClose").addEventListener("click", closeModal);
  // '이 파일 다운로드': 현재 형식 선택에 맞춰 해당 파일을 받는다(단건 경로 없으면 ZIP).
  const md = $("#mDownload");
  if (md) md.addEventListener("click", () => downloadOne(r, apiFmt()));
}
$("#lightbox").addEventListener("click", (e) => { if (e.target.id === "lightbox") closeModal(); });
document.addEventListener("keydown", (e) => {
  if ($("#lightbox").classList.contains("hidden")) return;
  if (e.key === "Escape") closeModal();
  else if (e.key === "ArrowLeft") modalStep(-1);
  else if (e.key === "ArrowRight") modalStep(1);
});

// ====== Summary rail ======
function renderSummary() {
  const p = PATTERNS.find((x) => x.id === patternId);
  const rows = [
    ["패턴", p ? p.name : null, !!p],
    ["디자인", design === "pass" ? "본체 포함 · 빈 본체" : design === "idle" ? null : "점검 경고", design === "pass"],
    ["주문 행", ORDER.length ? ORDER.length + "행" : null, ORDER.length > 0],
    ["예상 출력", p && ORDER.length ? RESULTS.length + "개 파일" : null, false],
  ];
  $("#summaryCard").innerHTML = rows.map(([label, val, ok]) => `
    <div class="summary__row">
      <span class="summary__label">${label}</span>
      <span class="summary__val ${val ? "is-set" : ""}">${ok ? '<span class="material-symbols-outlined">check_circle</span>' : ""}${val || "—"}</span>
    </div>`).join("");
}

// ====== Step orchestration ======
function canAdvance() {
  // 디자인: pass(정상) 또는 warn(완성본이지만 진행 허용) 이면 다음 단계로.
  const designOk = design === "pass" || design === "warn";
  // 생성 단계(3): 작업이 done 으로 끝나 결과(jobResult)가 도착하면 검수로 진행.
  const genOk = !!jobResult && genDone >= (jobTotal || 1);
  return [!!patternId, designOk, ORDER.length > 0, genOk, true][step];
}
function showPanel() {
  for (let i = 0; i < 5; i++) $("#panel-" + i).classList.toggle("hidden", i !== step);
  $("#panelTitle").textContent = TITLES[step];
  $("#panelSub").textContent = SUBS[step].replace("{fmt}", outFmt());
}
function update() {
  renderStepper();
  showPanel();
  renderSummary();
  $("#btnPrev").disabled = step === 0;
  const next = $("#btnNext");
  next.disabled = !canAdvance();
  if (step === 4) {
    next.innerHTML = '<span class="material-symbols-outlined">download</span>ZIP 다운로드';
    next.disabled = false;
  } else if (step === 3) {
    // 생성 단계: 아직 시작 전이면 '생성 시작'(명시적), 완료되면 '검수로 이동'.
    if (!genStarted) {
      next.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>이 형식으로 생성 시작';
      next.disabled = !patternId || !ORDER.length;   // 패턴·주문 갖춰지면 시작 가능
    } else {
      next.innerHTML = '검수로 이동<span class="material-symbols-outlined">arrow_forward</span>';
      next.disabled = !canAdvance();                 // 작업 done + 결과 도착 시 활성
    }
  } else {
    next.innerHTML = '다음 단계<span class="material-symbols-outlined">arrow_forward</span>';
  }
}
function goTo(n) {
  step = Math.max(0, Math.min(4, n));
  // ⚠️ 핵심 수정: 생성 단계(3) 진입 시 '자동 생성'을 하지 않는다.
  //   예전엔 여기서 곧장 startGenerate() 를 불러, 직원이 형식(PDF/EPS/둘다)을
  //   고르기도 전에 PDF 로 생성이 끝나버렸다(EPS 절대 안 만들어짐).
  //   이제는 형식 세그먼트만 먼저 보여주고, 직원이 '이 형식으로 생성 시작'을
  //   눌러야 비로소 선택한 형식으로 startGenerate() 가 돈다.
  if (step !== 3) clearInterval(genTimer);
  if (step === 3) prepGenerate();   // 생성 화면 초기화(형식 선택 대기)
  if (step === 4) renderReview();
  if (step !== 3) { $("#genProgress").classList.remove("progress--pass", "progress--fail"); $("#genCancel").classList.remove("hidden"); $("#genLabel").textContent = outFmt() + " 생성 중…"; }
  update();
}

$("#btnPrev").addEventListener("click", () => goTo(step - 1));
$("#btnNext").addEventListener("click", () => {
  // 생성 단계(3): 아직 시작 전이면 '생성 시작'(선택 형식으로), 시작·완료 후엔 검수로.
  if (step === 3 && !genStarted) {
    startGenerate();   // 직원이 고른 형식(apiFmt)으로 비로소 생성을 띄운다
    update();          // 버튼이 '검수로 이동'(비활성→완료 시 활성)으로 바뀜
    return;
  }
  if (step < 4) goTo(step + 1);
  else downloadZip(apiFmt());   // 검수 단계에서 '다음' = ZIP 다운로드
});
document.addEventListener("click", (e) => { if (e.target.closest("#genCancel")) { clearInterval(genTimer); goTo(2); } });

// ====== 서버 헬스체크 → 사이드바 '서버 연결됨' 표식 ======
// 사이드바의 server-pill 은 기본이 '연결됨' 으로 그려져 있다. 실제로 서버에
// 닿는지 GET /api/health 로 확인해, 안 닿으면 '연결 끊김(빨강)' 으로 바꾼다.
function refreshServerPill() {
  const pill = document.querySelector(".server-pill");
  if (!pill) return;
  apiFetch("/api/health")
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((d) => {
      pill.classList.remove("is-down");
      pill.innerHTML = `<span class="dot"></span>서버 연결됨 · :${d.port}`;
    })
    .catch(() => {
      pill.classList.add("is-down");
      pill.innerHTML = `<span class="dot" style="background:var(--red-500,#e5484d);"></span>서버 연결 끊김`;
    });
}

// ====== 패턴 목록 로드 (GET /api/patterns) ======
function loadPatterns() {
  return apiFetch("/api/patterns")
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((list) => {
      PATTERNS = Array.isArray(list) ? list : [];
      // 아직 선택된 패턴이 없으면 첫 패턴을 기본 선택으로 잡는다.
      if (!patternId && PATTERNS.length) patternId = PATTERNS[0].id;
      renderPatterns();
      update();
    })
    .catch(() => {
      // 서버에서 못 받아오면 빈 목록 안내(화면은 죽지 않게).
      PATTERNS = [];
      $("#panel-0").innerHTML = `<div class="note"><span class="material-symbols-outlined">error</span>패턴 목록을 불러오지 못했습니다. 서버 연결을 확인하세요.</div>`;
      update();
    });
}

// ====== 설정 기본값(출력 형식) 로드 ======
// 세그먼트를 아직 안 눌렀을 때(localStorage=vector) API 로 보낼 기본 형식을 정한다.
function loadSettings() {
  return apiFetch("/api/settings")
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((s) => {
      const f = (s.output_format || "pdf").toLowerCase();
      serverFmtDefault = (f === "eps" || f === "both") ? f : "pdf";
    })
    .catch(() => { serverFmtDefault = "pdf"; });
}

// ====== Init ======
renderPatterns();   // 처음엔 빈 화면(패턴 도착 전)
renderDesign();
renderOrder();
update();
refreshServerPill();
loadSettings();     // 출력 형식 기본값
loadPatterns();     // 서버에서 실제 패턴을 받아 다시 그린다.
</script>
</body>
</html>
